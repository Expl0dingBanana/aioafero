---
# Shared test/lint jobs for cicd.yaml and release.yaml.
# Python versions are defined once in workflow_call defaults below.
name: Reusable CI

on:
  workflow_call:
    inputs:
      python-versions:
        description: JSON array of Python versions for the test matrix
        type: string
        default: '["3.12", "3.13", "3.14"]'
      lint-python-version:
        description: Python version for the lint job
        type: string
        default: "3.14"
      run-codecov:
        description: Combine matrix coverage and upload to Codecov
        type: boolean
        default: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ inputs.lint-python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.lint-python-version }}
      - name: Run pre-commit (tox -e lint)
        run: |
          pip install tox
          tox -e lint

  run_tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}

    steps:
      - uses: actions/checkout@v6
      - name: Set coverage data file
        id: coverage
        run: echo "file=.coverage.py$(echo '${{ matrix.python-version }}' | tr -d '.')" >> "$GITHUB_OUTPUT"
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install requirements
        run: |
          pip install .[test]
      - name: Execute Tests
        env:
          COVERAGE_FILE: ${{ steps.coverage.outputs.file }}
        # Same as tox py envs: collect coverage silently; combined report in coverage job.
        run: |
          python -m pytest \
            -o addopts="--cov --cov-report=" \
            --junitxml=junit-py${{ matrix.python-version }}.xml \
            -o junit_family=legacy
      - name: Upload coverage data
        if: inputs.run-codecov
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: ${{ steps.coverage.outputs.file }}
          include-hidden-files: true
          if-no-files-found: error
      - name: Upload test results
        if: inputs.run-codecov
        uses: actions/upload-artifact@v4
        with:
          name: junit-py${{ matrix.python-version }}
          path: junit-py${{ matrix.python-version }}.xml
          if-no-files-found: error

  coverage:
    name: Combine coverage
    needs: run_tests
    if: ${{ inputs.run-codecov && !cancelled() && needs.run_tests.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ inputs.lint-python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.lint-python-version }}
      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-py*
          merge-multiple: true
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          pattern: junit-py*
          merge-multiple: true
          path: junit
      - name: Combine coverage and generate report
        run: |
          pip install coverage[toml]
          coverage combine
          coverage report -m
          coverage xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
      - name: Upload test results to Codecov
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit/junit-py*.xml
