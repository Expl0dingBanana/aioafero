# Tox configuration file
# Read more under https://tox.wiki/

[tox]
minversion = 3.24
envlist = default, py312, py313, py314, report, coverage, docs, audit
isolated_build = True
skip_missing_interpreters = true


[testenv]
description = Invoke pytest to run automated tests (current interpreter)
setenv =
    TOXINIDIR = {toxinidir}
passenv =
    HOME
    SETUPTOOLS_*
extras =
    test
commands =
    pytest {posargs}
allowlist_externals =
    python
    pytest


[testenv:py3{12,13,14}]
description = Run tests; coverage data stored in .coverage.{envname}
extras = test
setenv =
    COVERAGE_FILE = {toxinidir}/.coverage.{envname}
# pyproject.toml enables term-missing for local pytest. Here we replace addopts
# (not append --cov-report=) because pytest-cov treats --cov-report as
# multi-allowed; collect silently per Python version and print once after combine.
commands =
    pytest -o addopts="--cov=aioafero --cov-report="
allowlist_externals =
    python
    pytest


[testenv:report]
description = Combine coverage from all Python test environments
deps = coverage[toml]
skip_install = true
depends = py312, py313, py314
commands =
    coverage combine
    coverage report -m
    coverage xml
allowlist_externals =
    coverage


[testenv:coverage]
description = Run tests on all supported Python versions and produce combined coverage
depends = report
skip_install = true
commands =
    python -c "print('Combined coverage written to coverage.xml')"


 # To run `tox -e lint` you need to make sure you have a
 # `.pre-commit-config.yaml` file. See https://pre-commit.com
[testenv:lint]
description = Perform static analysis and style checks
skip_install = True
deps = pre-commit
passenv =
    HOMEPATH
    PROGRAMDATA
    SETUPTOOLS_*
commands =
 pre-commit run --all-files


[testenv:audit]
description = Scan installed dependencies for known vulnerabilities (pip-audit)
deps =
    pip-audit
extras = test
commands =
    python -m pip install -e .
    pip-audit --skip-editable


[testenv:docs]
description = Build Sphinx documentation (warnings as errors)
extras = docs
commands =
    sphinx-build -W -b html docs docs/_build/html
allowlist_externals =
    sphinx-build


[testenv:{build,clean}]
description =
    build: Build the package in isolation according to PEP517, see https://github.com/pypa/build
    clean: Remove old distribution files and temporary build artifacts (./build and ./dist)
# https://setuptools.pypa.io/en/stable/build_meta.html#how-to-use-it
skip_install = True
changedir = {toxinidir}
deps =
    build: build[virtualenv]
passenv =
    SETUPTOOLS_*
commands =
    clean: python -c 'import shutil; [shutil.rmtree(p, True) for p in ("build", "dist", "docs/_build")]'
    clean: python -c 'import pathlib, shutil; [shutil.rmtree(p, True) for p in pathlib.Path("src").glob("*.egg-info")]'
    build: python -m build {posargs}
# By default, both `sdist` and `wheel` are built. If your sdist is too big or you don't want
# to make it available, consider running: `tox -e build -- --wheel`

[testenv:publish]
description =
    Publish the package you have been developing to a package index server.
    By default, it uses testpypi. If you really want to publish your package
    to be publicly accessible in PyPI, use the `-- --repository pypi` option.
skip_install = True
changedir = {toxinidir}
passenv =
    # See: https://twine.readthedocs.io/en/latest/
    TWINE_USERNAME
    TWINE_PASSWORD
    TWINE_REPOSITORY
    TWINE_REPOSITORY_URL
deps = twine
commands =
    python -m twine check dist/*
    python -m twine upload --verbose dist/*
